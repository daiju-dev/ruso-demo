/* --- 量刑テキスト --- */
function sentenceText(){
  const y=parseFloat(judgeState.years||3);
  if(y===0)return"無罪";
  const yy=Math.floor(y),mm=(y%1)?"6月":"";
  return`拘禁刑${yy}年${mm}`+(judgeState.susp?"・執行猶予":"");
}

/* --- 採点 --- */
function grade(){
  const slotIds=Object.keys(CASE.slots);
  const emptySlots=slotIds.filter(s=>!judgeState.fill[s]);
  if(emptySlots.length){showToast("埋まっていない穴がある");return;}
  if(!judgeState.lieSel||!judgeState.proofSel){showToast("嘘と反証の指摘が終わっていない");return;}
  let correct=slotIds.filter(s=>judgeState.fill[s]===CASE.slots[s].accept).length;
  const lieOk=judgeState.lieSel===CASE.lie.answer;
  /* 反証は lie.proofs の要素かを厳格に照合する。proofs外の一文を突きつけていれば不正解 */
  const proofOk=proofIsValid(judgeState.proofSel);
  if(lieOk)correct++;
  if(proofOk)correct++;
  const total=slotIds.length+2;
  judgeState.tries=(judgeState.tries||0)+1;
  ptSubmit(correct,total); /* プレイテスト計測: 提出回数と各回の得点 */
  if(correct===total){
    solved=true;
    playSfx("success");
    if(judgeState.tries===1)recordAchievement("perfect_"+caseKey);
    judgeState.lastResult=`<strong>事実認定 ${total}/${total}(穴${slotIds.length}+嘘1+反証1) — 判決確定。</strong> スレに動きがある。`;
    renderJudge();
    setTimeout(openVerdict,900);
  }else{
    missCount++;failCount++;
    playSfx("fail");
    judgeState.lastResult=`<strong>事実認定 ${correct}/${total}。</strong>(全${total}項目=穴${slotIds.length}+嘘1+反証1)<br>どこが違うかは言えない。資料を読み直せ。`;
    renderJudge();
    document.getElementById("ov_judge").classList.add("open");
    if(missCount>=JUDGE_MISS_LIMIT){ setTimeout(mikokuri,900); return; } /* 立件見送り */
    /* ヒントは2回目・4回目のミスで発火(旧: 3回ごと) */
    if((missCount===2||missCount===4)&&hintGiven<CASE.hints.length){
      const h=CASE.hints[hintGiven++];
      ptHint(); /* プレイテスト計測: ヒントが出た回数 */
      setTimeout(()=>{appendThread([h]);showToast("スレに新着レスがある");},1200);
    }
  }
}

/* ============================================================
   突きつけUI v2
   ① 嘘を指す: 資料の一文をタップ → 確認「この一文を嘘と指すか?」[指す][戻る]
   ② 反証:     反証の一文を「嘘」チップにドラッグして重ねる → 突きつけ発動
              タッチ等でドラッグ不能でも、タップで選ぶ → [突きつける] で完結
   Escか枠外ドロップで②の選択に戻れる。Pointer Events で一本化。
   ============================================================ */
let pointCand=null;   /* ① で仮選択した嘘の sid */
let proofCand=null;   /* ② でタップ選択した反証の sid */
let dragS=null;       /* ドラッグ中の状態 */

function rmEl(id){const e=document.getElementById(id);if(e)e.remove();}
function clearSentMarks(){
  document.querySelectorAll(".sent.lie-cand,.sent.lie-target,.sent.proof-cand")
    .forEach(x=>x.classList.remove("lie-cand","lie-target","proof-cand"));
}
function cleanupPointing(){
  if(dragS&&dragS.ghost)dragS.ghost.remove();
  dragS=null;pointCand=null;proofCand=null;
  rmEl("thrustConfirm");rmEl("lieChip");rmEl("thrustBtn");
  clearSentMarks();
  document.body.classList.remove("pointing","pointing-lie","pointing-proof");
}

function enterPointing(){
  cleanupPointing();
  judgeState.pointing="lie";
  judgeState.lieSel=null;judgeState.proofSel=null;
  document.querySelectorAll(".overlay").forEach(o=>o.classList.remove("open"));
  document.body.classList.add("pointing","pointing-lie");
  const pg=CASE.pages.find(p=>p.id===CASE.lie.targetPage);
  if(pg&&pg.locked)openPage(pg);else activate(CASE.lie.targetPage);
  showToast("① 嘘だと思う一文を選べ");
}

/* ① 一文をタップ → 確認を出す */
function tapLie(sid){
  pointCand=sid;
  clearSentMarks();
  document.querySelectorAll(`.sent[data-sid="${sid}"]`).forEach(x=>x.classList.add("lie-cand"));
  rmEl("thrustConfirm");
  const c=document.createElement("div");
  c.id="thrustConfirm";c.className="thrust-confirm";
  c.innerHTML=`<div class="tc-box"><div class="tc-msg">この一文を嘘と指すか?</div>
    <div class="tc-btns"><button class="opt-btn" id="thrustConfirmYes">指す</button><button class="opt-btn" id="thrustConfirmNo">戻る</button></div></div>`;
  document.body.appendChild(c);
  c.querySelector("#thrustConfirmYes").onclick=confirmLie;
  c.querySelector("#thrustConfirmNo").onclick=cancelLieConfirm;
}
function cancelLieConfirm(){
  rmEl("thrustConfirm");
  clearSentMarks();
  pointCand=null;
}
/* [指す] → ②へ */
function confirmLie(){
  judgeState.lieSel=pointCand;
  rmEl("thrustConfirm");
  judgeState.pointing="proof";
  document.body.classList.remove("pointing-lie");
  document.body.classList.add("pointing-proof");
  clearSentMarks();
  document.querySelectorAll(`.sent[data-sid="${judgeState.lieSel}"]`).forEach(x=>x.classList.add("lie-target"));
  showLieChip();
  showToast("② 反証の一文を「嘘」に突きつけろ");
}
/* ② の間ずっと出る、ドロップ先の「嘘」チップ */
function showLieChip(){
  rmEl("lieChip");
  const chip=document.createElement("div");
  chip.id="lieChip";chip.className="lie-chip";
  chip.innerHTML=`<span class="lie-chip-tag">嘘</span><span class="lie-chip-text">「${sentPreview(judgeState.lieSel)}」</span><span class="lie-chip-hint">ここに反証を重ねる</span>`;
  document.body.appendChild(chip);
  const over=v=>{if(dragS)dragS.over=v;};
  chip.addEventListener("pointerenter",()=>over(true));
  chip.addEventListener("pointerover",()=>over(true));
  chip.addEventListener("pointerleave",()=>over(false));
  /* タップ選択済みの反証があれば、チップへのクリックでも突きつけられる */
  chip.addEventListener("click",()=>{if(proofCand&&!dragS)doThrust(proofCand,"tap");});
}

/* ② タップ選択 → [突きつける] ボタンを出す */
function selectProof(sid){
  proofCand=sid;
  document.querySelectorAll(".sent.proof-cand").forEach(x=>x.classList.remove("proof-cand"));
  document.querySelectorAll(`.sent[data-sid="${sid}"]`).forEach(x=>x.classList.add("proof-cand"));
  rmEl("thrustBtn");
  const b=document.createElement("button");
  b.id="thrustBtn";b.className="thrust-btn";b.textContent="突きつける";
  document.body.appendChild(b);
  b.onclick=()=>doThrust(proofCand,"tap");
}

/* 突きつけ成立 */
function doThrust(sid,via){
  if(!sid)return;
  ptThrust(via==="drag"?"drag":"tap"); /* プレイテスト計測: 突きつけ試行(経路別) */
  judgeState.proofSel=sid;
  judgeState.pointing=false;
  cleanupPointing();
  playSfx("confirm"); /* 突きつけ成立(反証ドロップ受理)の決定音 */
  showToast("指摘完了。認定パネルに戻る");
  renderJudge();
  document.getElementById("ov_judge").classList.add("open");
}

/* ドラッグ(Pointer Events) */
function onDragMove(e){
  if(!dragS)return;
  if(!dragS.moved&&Math.hypot(e.clientX-dragS.x,e.clientY-dragS.y)>6){
    dragS.moved=true;
    const g=document.createElement("div");
    g.className="sent-ghost";g.textContent="「"+sentPreview(dragS.sid)+"」";
    document.body.appendChild(g);dragS.ghost=g;
  }
  if(dragS.moved){
    if(dragS.ghost){dragS.ghost.style.left=e.clientX+"px";dragS.ghost.style.top=e.clientY+"px";}
    try{const el=document.elementFromPoint(e.clientX,e.clientY);
      if(el&&el.closest&&el.closest("#lieChip"))dragS.over=true;}catch(_){}
  }
}
function onDragUp(){
  document.removeEventListener("pointermove",onDragMove);
  document.removeEventListener("pointerup",onDragUp);
  const ds=dragS;dragS=null;
  if(ds.ghost)ds.ghost.remove();
  if(!ds.moved){selectProof(ds.sid);return;}   /* タップ扱い */
  if(ds.over){doThrust(ds.sid,"drag");return;}  /* 「嘘」に重ねた → 成立(ドラッグ経路) */
  /* 枠外にドロップ → ②の選択に戻る(状態は変えない) */
  showToast("突きつけをやり直す。反証の一文を選び直せ");
}

/* .sent 上での操作。① はクリックで確認、② は pointerdown でドラッグ/タップ */
document.addEventListener("pointerdown",e=>{
  if(judgeState.pointing!=="proof")return;
  const st=e.target.closest(".sent");
  if(!st)return;
  e.preventDefault();
  dragS={sid:st.dataset.sid,x:e.clientX,y:e.clientY,moved:false,over:false,ghost:null};
  document.addEventListener("pointermove",onDragMove);
  document.addEventListener("pointerup",onDragUp);
});

/* --- 採取(トークン)& ① の嘘タップ(六法オーバーレイ内の語も拾えるようdocumentで監視) --- */
document.addEventListener("click",e=>{
  /* ① 嘘を指す局面: 一文タップで確認を出す */
  if(judgeState.pointing==="lie"){
    const st=e.target.closest(".sent");
    if(st)tapLie(st.dataset.sid);
    return;
  }
  const tk=e.target.closest(".tok");
  if(tk&&!judgeState.pointing){
    const id=tk.dataset.tok;
    if(!pool.has(id)){
      pool.add(id);
      document.querySelectorAll(`.tok[data-tok="${id}"]`).forEach(x=>x.classList.add("got"));
      showToast("採取: 「"+tokenLabel(id)+"」");
      playSfx("collect");
      renderJudge();
    }
    return;
  }
});

/* --- 判決反応: プレイヤーの量刑/配分の帯で、反応レス(PLAYERへの返信)の本文が変わる。
   帯判定は確定時の値から。body が無い帯(near/statutory相当)は既存のケース本文を維持する。
   本文は data/verdict_reactions.json(=Fable支給の md が正)。 --- */
function verdictReaction(){
  const cfg=(typeof __REACTIONS__!=="undefined"&&__REACTIONS__)?__REACTIONS__[caseKey]:null;
  if(!cfg)return null;
  let band=null;
  if(cfg.kind==="civil"){
    const g=statutoryGuide();
    const wd=(settleState.alloc[cfg.wifeId]||0)-(g.shares[cfg.wifeId]||0);
    const thr=(cfg.thresholdPct||0.05)*g.basis;
    const id=wd>thr?"wife":(wd<-thr?"children":"statutory");
    band=cfg.bands.find(b=>b.id===id);
  }else{
    const y=parseFloat(judgeState.years||3);
    band=cfg.bands.find(b=>y>=b.lo&&y<=b.hi);
  }
  if(!band)return null;
  return {postNo:cfg.postNo,band};
}

/* --- リザルト: 判決スレ --- */
function openVerdict(){
  document.querySelectorAll(".overlay").forEach(o=>o.classList.remove("open"));
  const vt=CASE.verdictThread;
  /* 判決/和解スレの日付(常駐日時がこのページを開いている間はこれを出す) */
  (vt.posts||[]).forEach(p=>{const d=pickDate(p.date);if(d>verdictDate)verdictDate=d;});
  const reaction=verdictReaction();
  const posts=vt.posts.map(p=>{
    if(p.uid==="PLAYER"){
      return renderPost({...p,uid:"You"+Math.random().toString(36).slice(2,8),
        body:vt.playerPostTemplate
          .replace("{SENTENCE_CASE03}",pastSentence("case03"))
          .replace("{SENTENCE}",outcomeText())
          .replace("{SETTLEMENT}",outcomeText())});
    }
    /* 反応レス: 帯に body があればそれで差し替える(無ければ既存本文のまま) */
    if(reaction&&p.no===reaction.postNo&&reaction.band.body!=null){
      return renderPost({...p,body:reaction.band.body});
    }
    return renderPost(p);
  }).join("");
  /* セッション記録に保存 */
  if(caseNum){
    const cn=caseKey;
    if(isCivil){
      const g=statutoryGuide(),diff={};
      partyIds().forEach(id=>diff[id]=(settleState.alloc[id]||0)-(g.shares[id]||0));
      window.__rusoSave.settlements[cn]={
        alloc:Object.assign({},settleState.alloc),
        toggles:Object.assign({},settleState.toggles),
        statutory:{basis:g.basis,deemed:g.deemed,shares:Object.assign({},g.shares)},
        diff
      };
    }else{
      window.__rusoSave.sentences[cn]=sentenceText();
    }
    /* 反応レスの帯を確定時の値で保存(再訪しても同じ帯で揺れない材料) */
    if(reaction)window.__rusoSave.reactions[cn]=reaction.band.id;
    window.__rusoSave.cleared[cn]=true;
    /* プレイテスト計測: このランを確定して追記 */
    ptFinalize(outcomeText(),reaction?reaction.band.id:null);
    recordAchievement("clear_"+cn); /* この中で saveNow() が走る */
    /* 全章クリア判定はチャプター選択側で行う */
  }

  /* 実績: 判決スレの鯨AA(aa:true のレス)が描画された */
  if((vt.posts||[]).some(p=>p.aa))recordAchievement("aa_seen_"+caseKey);
  const el=document.createElement("div");
  el.className="page";el.id="pg_verdict";
  el.innerHTML=`<div class="board-head">あかしや掲示板 ＞ ニュース速報(裏) ＞ スレ表示　— 数ヶ月後 —</div>
    <div class="thread-title">${vt.title}</div>
    ${renderAd("verdict")}
    ${posts}
    <div class="hanji">${CASE.hanji.replace(/\n/g,"<br>")}</div>
    <p><strong>解説:</strong> ${CASE.explanation}</p>
    <div class="q" id="gaseArea">
      <label class="q-label">${CASE.gase.label}</label>
      <div class="gase-list">${CASE.gase.candidates.map(gaseCandidateHTML).join("")}</div>
      <button id="gaseBtn" class="ghost">ガセ認定を提出(任意)</button>
      <div class="result" id="gaseResult"></div>
    </div>
    ${finalRecognitionHTML()}
    <div class="disclaimer">${CASE.disclaimer}</div>`;
  viewport.appendChild(el);
  wireFinalRecognition();
  /* 締めのトリガ: 免責の下端が見えたら締め演出(右下AA→弾幕→暗転→全画面)を始める。
     ガセ提出でも始まる=早い方(下の gaseBtn 参照)。 */
  const disc=el.querySelector(".disclaimer");
  const onScroll=()=>{
    if(finaleSeqRun||document.getElementById("finaleAA").classList.contains("up"))return;
    const dr=disc.getBoundingClientRect(),vr=viewport.getBoundingClientRect();
    if(dr.bottom<=vr.bottom+2){viewport.removeEventListener("scroll",onScroll);beginFinaleSequence();}
  };
  viewport.addEventListener("scroll",onScroll);
  const t=makeTab("verdict",verdictTabLabel());
  t.classList.add("new");
  /* 元スレのタブにも未読の点滅(判決後にスレが動いたことを示す) */
  const homeThread=document.querySelector(`.btab[data-target="${CASE.pages[0].id}"]`);
  if(homeThread&&!homeThread.classList.contains("active"))homeThread.classList.add("new");
  activate("verdict");

  /* --- 判決確定の演出: 通知SE → タブ切替(済) → PLAYERレスと反応レスへスクロール --- */
  const playerPost=vt.posts.find(p=>p.uid==="PLAYER");
  const focusEls=[];
  if(playerPost){
    const pe=el.querySelector(`.post[data-no="${playerPost.no}"]`);
    if(pe)focusEls.push(pe);
  }
  if(reaction){
    const re=el.querySelector(`.post[data-no="${reaction.postNo}"]`);
    if(re)focusEls.push(re);
  }
  playSfx("verdict"); /* 判決確定の専用通知音(unlock流用をやめた) */
  /* 提出成功時に画面位置は動かさない(D-95)。スレ先頭送りも PLAYERレスへのパンも廃止。
     判決スレへ行くかどうかはプレイヤーのスクロール/操作に委ねる。
     目印(verdict-focus)だけは残す — 自分でたどり着いたとき、どのレスかが分かるように。 */
  if(focusEls.length){
    focusEls.forEach(x=>{x.classList.add("verdict-focus");
      setTimeout(()=>x.classList.remove("verdict-focus"),3600);});
  }
  showToast("判決が出た。スレに動きがある"); /* 新着の告知はこのトーストのみ */

  /* 引用ブロックのタップで選択/解除。再タップで戻せる(誤タップの救済) */
  el.querySelectorAll(".gase-cand").forEach(c=>{
    const toggle=()=>{
      if(document.getElementById("gaseBtn").disabled)return; /* 提出後は動かさない */
      const on=c.classList.toggle("gase-picked");
      c.setAttribute("aria-pressed",on?"true":"false");
    };
    c.onclick=toggle;
    c.onkeydown=e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();toggle();}};
  });
  document.getElementById("gaseBtn").onclick=()=>{
    const sel=[...el.querySelectorAll(".gase-cand.gase-picked")].map(c=>+c.dataset.gase).sort((a,b)=>a-b);
    const ans=[...CASE.gase.answers].sort((a,b)=>a-b);
    const ok=sel.length===ans.length&&sel.every((v,i)=>v===ans[i]);
    const gr=document.getElementById("gaseResult");
    gr.classList.add("show");
    gr.innerHTML=(ok?"<strong>全問正解。</strong> ":"<strong>不正解。</strong> ")+CASE.gase.explain;
    playSfx(ok?"success":"fail"); /* ガセ提出: 正解=success / 不正解=fail を流用 */
    if(ok)recordAchievement("gase_perfect_"+caseKey);
    document.getElementById("gaseBtn").disabled=true;
    setTimeout(beginFinaleSequence,900); /* ガセ提出でも締め演出(免責まで読む前でも始まる=早い方) */
  };
}

/* --- 弾幕エンジン(ニコニコ式・右→左) --- */
/* 同時表示は「レーン数」で決まる(1レーン1発=重なり禁止)。レーン数は画面高から
   行高 LANE_H で算出し LANE_MIN〜LANE_MAX にクランプ(=実質の同時表示上限)。
   DANMAKU_HARD_MAX は保険の絶対上限。報告値: 同時表示 ≈ レーン数(概ね10〜24)。 */
const LANE_H=32, LANE_MIN=10, LANE_MAX=24, DANMAKU_HARD_MAX=48;
const DANMAKU_RAMP_MS=4000;   /* 疎→密のランプ(約4秒。2段の波で最密へ) */
const FINALE_CORNER_DELAY=2600; /* 右下AA表示から弾幕開始までの「数秒」 */
/* 締めの一語は「弾幕の群れの最後尾」として、他の弾がまだ流れているうちに投入する(D-102)。
   画面が空になる瞬間を挟まないよう、**最後の弾が消えるより NANASHI_OVERLAP_MS だけ手前で
   中央に到達する**ように逆算して発射する。逆算が短すぎる場合は最低 NANASHI_MIN_DELAY_MS 待つ
   (=最後の通常弾の少し後)。 */
const NANASHI_OVERLAP_MS=1200; /* 中央到達を、最後の弾が消える何ms前に置くか */
const NANASHI_MIN_DELAY_MS=400; /* 供給停止から発射までの最低待ち(最後の通常弾の少し後) */
const C07_NANASHI_AFTER_TAIL_MS=5200; /* c07: 末尾2語目の投入から、停止語を出すまで */
const NANASHI_STOP_MS=1600;   /* 締めの一語が中央で止まるまで(CSS transition と揃える) */
const FINALE_AUTO_HOME_MS=3200; /* 全画面締めの演出が終わってから自動でホームへ戻るまでの一拍 */
/* 締めの一語。data/danmaku.json の弾幕コア語をそのまま使う(新規執筆はしない) */
const NANASHI_TEXT="名無しに戻るか";
/* 締めの一語を弾幕レイヤ中央に出し、止まったらボタンにする。押されるまで何も起きない。
   fly=false のときは流れる動きなしで中央に静的表示(reduced-motion 用)。 */
function mountNanashi(layer,fly,onPress){
  const b=document.createElement("button");
  b.className="danmaku-item dk-nanashi";
  b.id="danmakuNanashi";
  b.textContent=NANASHI_TEXT;
  layer.appendChild(b);
  const ready=()=>b.classList.add("ready"); /* 停止=ここで初めてクリックを拾う */
  if(fly===false){ready();}
  else{
    requestAnimationFrame(()=>b.classList.add("fly-in"));
    /* transitionend は「プロパティごと」に飛ぶ。この語は transform 1.6s と opacity .5s の
       2本を走らせているので、素で拾うと **opacity が終わる0.5秒で ready になり、
       まだ飛行中の語が押せてしまう**(中央停止を経ずに暗転する原因・D-99)。
       中央到達を意味するのは transform の完了だけなので、それ以外は捨てる。 */
    b.addEventListener("transitionend",e=>{
      if(e.propertyName!=="transform")return;
      ready();
    });
    setTimeout(ready,NANASHI_STOP_MS+120); /* transitionend が来ない環境の保険 */
  }
  b.onclick=e=>{e.stopPropagation();onPress();};
  return b;
}
const DANMAKU_THIN_MS=4200;   /* c07: 最密後に徐々に疎になる(板が散る)時間 */
const DANMAKU_TICK_MS=100;    /* 弾幕チックSEの間引き: この窓で最大1発(密度が上がると自然に増える) */
let danmakuRun=null;          /* 実行中の弾幕(二重起動防止) */

function runDanmaku(onDone){
  const layer=document.getElementById("danmakuLayer");
  const d=danmakuData();
  const core=(d.core||[]), inserts=(d.inserts||[]).slice(), tail=(d.tail||null);
  if(!layer||!core.length){onDone&&onDone();return;} /* 語彙が無ければ弾幕なし */

  layer.innerHTML="";layer.classList.remove("fade");layer.classList.add("active");
  const H=()=>layer.clientHeight||520, W=()=>layer.clientWidth||960;
  const LANES=Math.max(LANE_MIN,Math.min(LANE_MAX,Math.floor(H()/LANE_H)));
  /* spawnTimers=生成スケジュール(finishで止める) / rmTimers=各弾の除去(最後まで生かす) */
  const run={alive:true,live:0,items:new Set(),lanes:new Array(LANES).fill(0),
             spawnTimers:[],rmTimers:[],t0:_now(),done:false,lastTickAt:0,
             drainEndAt:0,longLaneAt:new Array(LANES).fill(-1e9),
             liveChars:0,emaChars:null}; /* drainEndAt=いま画面にいる弾のうち、最後の1つが消える時刻 */
  danmakuRun=run;
  /* コメント出現の極小チック。100ms窓で最大1発に間引く。ピッチは±ランダムに散らす。
     密度が上がるほど spawn 回数が増え、自然にチックも増える。 */
  function danmakuTick(){
    const now=_now();
    if(now-run.lastTickAt<DANMAKU_TICK_MS)return;
    run.lastTickAt=now;
    playSfx("dktick",{pitch:0.82+Math.random()*0.52});
  }

  const laneTop=i=>{const gap=H()/LANES;return Math.round(gap*i+gap*0.15);};

  /* 差し込み語は各1〜2回だけ。ランプ中のランダムな時刻に低頻度で混ぜる。 */
  const insertPlan=[];
  inserts.forEach(w=>{const n=1+Math.floor(Math.random()*2);
    for(let k=0;k<n;k++)insertPlan.push({w,at:Math.random()*DANMAKU_RAMP_MS});});
  insertPlan.sort((a,b)=>a.at-b.at);
  /* --- 供給列の設計(D-103) --------------------------------------------------
     コア語をランダムに引くと長短の並びが運任せになり、長い弾が抜けた直後に
     短い弾しか残らない区間ができて画面の文字量が波打つ。
     そこで「1周ぶんの山札」を作り、長短が固まらないよう並べ替えてから配る。
     山札は1周につき各語ちょうど1回 = **出現頻度は厳密に不変**。変えるのは順序だけ。 --- */
  const meanLen=core.reduce((n,w)=>n+w.length,0)/Math.max(1,core.length);
  const isLongWord=w=>w.length>meanLen;
  function shuffled(a){
    const x=a.slice();
    for(let i=x.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));const t=x[i];x[i]=x[j];x[j]=t;}
    return x;
  }
  /* 長い語群と短い語群に割り、少ない方を多い方の間へ等間隔に差し込む。
     → 長い語が連続しない / 短い語だけの区間ができない。順序はシャッフル済みなので
     見た目のランダム性は保たれ、偏りだけが消える。 */
  function balancedDeck(){
    const longs=shuffled(core.filter(isLongWord));
    const shorts=shuffled(core.filter(w=>!isLongWord(w)));
    if(!longs.length||!shorts.length)return shuffled(core);
    const base=shorts.length>=longs.length?shorts:longs;
    const ins =shorts.length>=longs.length?longs:shorts;
    const step=base.length/(ins.length+1);
    const out=[];let bi=0,ii=0,next=step;
    while(bi<base.length||ii<ins.length){
      if(ii<ins.length&&(bi>=next||bi>=base.length)){out.push(ins[ii++]);next+=step;}
      else out.push(base[bi++]);
    }
    return out;
  }
  /* さらに、山札の先頭 NANASHI 以外… ではなく「先読み窓」の中だけ並べ替えて、
     いま画面に出ている文字量の過不足を打ち消す語を選ぶ(フィードバック)。
     窓の中から1枚を抜くだけなので、**1周で各語ちょうど1回**は崩れない=頻度は不変。
     文字量が平均を下回っていれば長い語を、上回っていれば短い語を先に出す。 */
  const DECK_LOOKAHEAD=5;
  let deck=[];
  function nextCore(){
    if(!deck.length)deck=balancedDeck();
    const n=Math.min(DECK_LOOKAHEAD,deck.length);
    if(n<=1||run.emaChars==null)return deck.shift();
    const wantLong=run.liveChars<run.emaChars;
    let bi=0;
    for(let i=1;i<n;i++){
      const better=wantLong?deck[i].length>deck[bi].length:deck[i].length<deck[bi].length;
      if(better)bi=i;
    }
    return deck.splice(bi,1)[0];
  }
  function pickWord(elapsed){
    if(insertPlan.length&&insertPlan[0].at<=elapsed)return insertPlan.shift().w;
    return nextCore();
  }
  /* 長い弾が同じレーン帯に固まると、そこがまとめて抜けた瞬間に文字量が急落する。
     長い弾だけは「直近に長い弾を載せたレーンから最も離れた空きレーン」を選ぶ。 */
  const LONG_LANE_MEMORY_MS=2600;
  function freeLane(now,isLong){
    const avail=[];
    for(let i=0;i<LANES;i++)if(run.lanes[i]<=now)avail.push(i);
    if(!avail.length)return -1;
    if(!isLong)return avail[Math.floor(Math.random()*avail.length)];
    const busy=[];
    for(let i=0;i<LANES;i++)if(now-run.longLaneAt[i]<LONG_LANE_MEMORY_MS)busy.push(i);
    if(!busy.length)return avail[Math.floor(Math.random()*avail.length)];
    let best=-1,bestD=-1,ties=[];
    for(const i of avail){
      let dmin=LANES;
      for(const j of busy)dmin=Math.min(dmin,Math.abs(i-j));
      if(dmin>bestD){bestD=dmin;ties=[i];}
      else if(dmin===bestD)ties.push(i);
    }
    best=ties[Math.floor(Math.random()*ties.length)];
    return best;
  }
  const isTail=cls=>cls&&/\btail\b/.test(cls);
  const isBig=t=>/^8+$/.test(t)||t==="傍聴乙"; /* 大サイズ許可=「8888…」「傍聴乙」系のみ */
  function sizeClassFor(text){
    /* 小≈7割 / 中≈2.5割 / 大=ごく稀(8888…・傍聴乙系のみ) */
    if(isBig(text)&&Math.random()<0.28)return "dk-lg";
    return Math.random()<0.74?"dk-sm":"dk-md";
  }
  function variantText(text){
    /* 「w」系はごく稀に長く尾を引く。語彙・頻度は変えず、表示上の変則のみ */
    if(/^w+$/.test(text)&&Math.random()<0.12)return "wwwwwwwwwwww";
    return text;
  }
  function spawn(text,cls){
    const now=_now();
    const shownLen=(text||"").length;
    const lane=freeLane(now,!isTail(cls)&&shownLen>meanLen);
    if(lane<0)return false;                          /* 空きレーンなし=重なり回避 */
    if(!isTail(cls)&&run.live>=DANMAKU_HARD_MAX)return false; /* 絶対上限(末尾語は別枠で通す) */
    const shown=isTail(cls)?text:variantText(text);
    const el=document.createElement("div");
    el.className="danmaku-item"+(cls?" "+cls:"")+(isTail(cls)?"":" "+sizeClassFor(shown));
    el.textContent=shown;el.style.top=laneTop(lane)+"px";
    el.style.opacity=(0.80+Math.random()*0.20).toFixed(2); /* 不透明度に微差=奥行き感 */
    layer.appendChild(el);run.items.add(el);run.live++;
    run.liveChars+=shown.length;
    /* 画面内文字量のゆるやかな基準線(意図した密度カーブに追従する) */
    run.emaChars=(run.emaChars==null)?run.liveChars:run.emaChars*0.97+run.liveChars*0.03;
    const w=el.offsetWidth||shown.length*20;
    /* 速度: 現行より広いレンジ。長文ほど遅い。 */
    const dur=Math.round(4200+Math.random()*4200+Math.min(shown.length,22)*170);
    el.style.setProperty("--dx",-(W()+w+40)+"px");
    el.style.setProperty("--dur",dur+"ms");
    requestAnimationFrame(()=>{if(run.items.has(el))el.classList.add("fly");});
    /* このレーンが再び空くのは、弾の後端が画面右を抜けてから */
    run.lanes[lane]=now+dur*(w+40)/(W()+w+40);
    if(!isTail(cls)&&shown.length>meanLen)run.longLaneAt[lane]=now; /* 長い弾の分散用 */
    const gone=dur+150;
    run.drainEndAt=Math.max(run.drainEndAt,now+gone); /* 捌け切りの時刻を更新 */
    run.rmTimers.push(setTimeout(()=>{
      el.remove();run.items.delete(el);run.live--;run.liveChars-=shown.length;
    },gone));
    if(!isTail(cls))danmakuTick(); /* 末尾語(c07)は無音。通常弾のみ極小チック */
    return true;
  }
  function stopSpawning(){run.spawnTimers.forEach(clearTimeout);run.spawnTimers=[];}
  function stopAll(){stopSpawning();run.rmTimers.forEach(clearTimeout);run.rmTimers=[];}
  /* 暗転は常に穏やかなフェード。瞬断(instant)は廃止(D-94)。
     SEはここ=フェード開始時に止める(弾幕チックは捌けに伴い自然減で終わっている)。 */
  function toFinale(){
    if(run.done)return;run.done=true;run.alive=false;stopAll();
    stopAllSfx();
    layer.classList.add("fade");
    setTimeout(()=>{layer.classList.remove("active");layer.innerHTML="";},800);
    onDone&&onDone(false);
  }
  const spawnTail=(txt,tries)=>{ if(!spawn(txt,"tail")&&tries>0)setTimeout(()=>spawnTail(txt,tries-1),400); };
  /* 弾幕の最後尾。「名無しに戻るか」が他の弾と同じ見た目で右から流れ、中央で減速停止して
     ボタンになる。押されるまで暗転しない=余韻の長さはプレイヤーに委ねる(D-97)。 */
  let nanashiShown=false;
  function presentNanashi(fly){
    if(run.done||nanashiShown)return;
    nanashiShown=true;
    stopSpawning();                 /* 供給は止める(既に止まっていることが多い) */
    mountNanashi(layer,fly!==false,toFinale);
  }
  /* c01〜06: 最密に達したら「新規コメントの供給だけ」を止め、画面上の弾は
     左端まで流れ切らせて自然に捌けさせる。捌け切って静かになったら穏やかにフェード。
     一斉静止と瞬断は廃止(D-94)。既存の rmTimers が各弾を最後まで生かす。 */
  function drainOut(){
    for(let i=0;i<LANES;i++)spawn(pickWord(DANMAKU_RAMP_MS)); /* 空きレーンを埋めて最密に到達させる */
    /* 画面が空になる瞬間を作らない。まだ弾がいるうちに停止語を出し、
       中央到達が「捌け切りの少し手前」に重なるよう逆算する(D-102)。 */
    const remain=Math.max(0,run.drainEndAt-_now());
    const delay=Math.max(NANASHI_MIN_DELAY_MS,remain-NANASHI_OVERLAP_MS-NANASHI_STOP_MS);
    setTimeout(presentNanashi,delay);
  }
  /* c07: 最密後、徐々に疎に(板が散る)→ 静かな画面を最後の2語が順に渡る → 静かにフェード */
  function thinOut(){
    const tStart=_now();
    (function thin(){
      if(run.done)return;
      const tp=(_now()-tStart)/DANMAKU_THIN_MS;
      if(tp<1){
        if(Math.random()<(1-tp)*0.9)spawn(pickWord(DANMAKU_RAMP_MS)); /* 減衰させながら生成 */
        run.spawnTimers.push(setTimeout(thin,Math.round(140+tp*320)));
      }else{
        setTimeout(()=>{ /* 疎になりきった静かな画面に、最後の2語 */
          spawnTail(tail[0],8);
          setTimeout(()=>spawnTail(tail[1]||tail[0],8),1900);
          /* 2語目が十分に渡ってから、まだ画面にいるうちに停止語を重ねる(D-102)。
             2語の読みは妨げない = 2語目の投入から C07_NANASHI_AFTER_TAIL_MS 置く。 */
          setTimeout(presentNanashi,1900+C07_NANASHI_AFTER_TAIL_MS);
        },900);
      }
    })();
  }
  /* ランプ終了(=最密到達)。c07 は疎化→末尾語→フェード。それ以外は捌け→フェード。 */
  function finish(){
    if(run.done)return;
    run.alive=false;stopSpawning(); /* 生成スケジュールだけ止める(既存の弾は生かす) */
    if(tail&&tail.length)thinOut(); else drainOut();
  }
  /* 密度は単調増加でなく2段の波(盛り→少し引く→最密)で最密到達する */
  function intensity(p){
    if(p<0.40)return 0.15+(0.72-0.15)*(p/0.40);          /* 盛り */
    if(p<0.60)return 0.72-(0.72-0.48)*((p-0.40)/0.20);   /* 少し引く */
    return 0.48+(1.0-0.48)*((p-0.60)/0.40);              /* 最密へ */
  }
  function tick(){
    if(!run.alive)return;
    const elapsed=_now()-run.t0,p=Math.min(1,elapsed/DANMAKU_RAMP_MS),inten=intensity(p);
    const burst=1+Math.floor(inten*3);
    for(let k=0;k<burst;k++)spawn(pickWord(elapsed));
    if(elapsed>=DANMAKU_RAMP_MS){finish();return;}
    run.spawnTimers.push(setTimeout(tick,Math.round(360-(360-80)*inten)));
  }
  /* クリックで弾幕スキップ: 供給停止+残弾幕を即消し → そのまま締めの一語へ(暗転はしない)。
     一語が出たあとは、語以外のクリックを一切拾わない(誤クリックで飛ばさない・D-97)。 */
  layer.onclick=()=>{if(run.done||nanashiShown)return;
    run.alive=false;stopAll();
    run.items.forEach(el=>el.remove());run.items.clear();run.live=0;
    presentNanashi();};
  tick();
}

/* 章の終わりの通し演出: 右下AA →(数秒)→ 弾幕 → 暗転 → 全画面締め。
   prefers-reduced-motion または語彙なしのときは弾幕を丸ごと省略し、右下AA→暗転。 */
let finaleSeqRun=false;
function beginFinaleSequence(opts){
  const preview=!!(opts&&opts.preview);
  if(document.getElementById("finaleAA").classList.contains("up"))return;
  if(finaleSeqRun)return;
  finaleSeqRun=true;
  showFinaleCorner();
  /* 暗転は常にフェード(瞬断は廃止・D-94)。弾幕の捌け切り / c07の末尾語 /
     reduced-motion・語彙なしの弾幕省略、いずれも同じ穏やかなフェードで全画面締めへ。 */
  const toFinal=()=>{finaleSeqRun=false;
    document.getElementById("finaleCorner").classList.add("fade");
    showFinale({preview});};
  if(prefersReducedMotion()||!(danmakuData().core||[]).length){
    /* 弾幕省略: 右下AA →「名無しに戻るか」を中央に静的表示(流れる動きなし)→ 押されたら暗転 */
    setTimeout(()=>{
      const layer=document.getElementById("danmakuLayer");
      layer.innerHTML="";layer.classList.remove("fade");layer.classList.add("active");
      layer.onclick=()=>{}; /* 語以外のクリックは拾わない */
      mountNanashi(layer,false,()=>{
        layer.classList.add("fade");
        setTimeout(()=>{layer.classList.remove("active");layer.innerHTML="";},800);
        toFinal();
      });
    },1600);
    return;
  }
  const seqTimer=setTimeout(()=>runDanmaku(toFinal),FINALE_CORNER_DELAY);
  void seqTimer;
}
function showFinale(opts){
  const preview=!!(opts&&opts.preview);
  const f=document.getElementById("finaleAA");
  if(f.classList.contains("up"))return;
  /* 「名無しに戻るか」の停止ボタンは弾幕の最後尾へ移設した(D-97)。ここには置かない。
     製品/プレビュー: 演出が終わったら一拍おいて自動でホームへ戻る(アクション無し)。
     demo: 序章文と X/Steam の既存導線は維持し、自動遷移はしない
           (ボタンを押させる画面のため)。戻りは既存文言の簡素なリンクだけ残す。 */
  const homeLink=`<p class="finale-home"><a href="#" id="finaleBack">${NANASHI_TEXT}</a></p>`;
  const isDemoOutro=!preview&&isDemo();
  const actions=isDemoOutro ? demoOutroHTML()+homeLink : "";
  f.innerHTML=`<div class="finale-inner">
    <div class="aa">${CASE.finaleAA.aa}</div>
    <div class="finale-caption">${CASE.finaleAA.caption}</div>
    <div class="finale-actions" id="finaleActions" hidden>${actions}</div>
  </div>`;
  requestAnimationFrame(()=>f.classList.add("up"));
  playSfx("unlock"); /* SEは既存の解錠音を流用(暗転の直後に鳴る締めの通知音) */
  const exit=preview?backToDebug:backToBoard;
  /* 一拍おいて最終段へ進める。段階送りは現行どおり(何度呼んでも1回だけ)。 */
  let staged=false;
  function revealActions(){
    if(staged)return;staged=true;
    const act=document.getElementById("finaleActions");
    if(act)act.hidden=false;
    const back=document.getElementById("finaleBack");
    if(back)back.onclick=e=>{e.preventDefault();e.stopPropagation();exit();}; /* demoの戻りリンク */
    if(isDemoOutro&&typeof wireDemoOutro==="function")wireDemoOutro(); /* demoの保険ボタン */
    /* 演出が終わったら自動でホームへ。demo は押させる画面なので自動遷移しない。
       追加エンディング(フラグON)が出る場合も、そちらを潰さないよう自動遷移しない。 */
    if(!isDemoOutro&&!(CASE.ending&&flagOn("ending")))setTimeout(exit,FINALE_AUTO_HOME_MS);
  }
  setTimeout(revealActions,1400);
  /* 画面の他の場所のクリックは「段階送り」まで。ここでホームへは遷移しない。 */
  f.onclick=e=>{
    if(e.target.closest("a,button"))return; /* ボタン/リンクは各ハンドラに任せる */
    revealActions();
  };
  /* 本編クリア時だけ追加エンディング(フラグON時)。プレビューでは鳴らさない。 */
  if(!preview)setTimeout(showEnding,2600);
}

document.getElementById("btnFwd").onclick=goFwd;

/* ホームを最初のタブにして、そこから始める(額縁は全画面で同じ)。
   ただし他章のホームリンクから caseNN.html#thread で来た場合は、本スレを直接開く
   (ホームで足止めしない=別HTMLへ移っても目的の章がすぐ遊べる)。 */
(function(){
  const t=makeTab("home","ホーム");
  tabbar.insertBefore(t,tabbar.firstChild); /* ホームは常に左端 */
})();
renderHome();
if(location.hash==="#dbgfinale"&&!isDemo()){
  /* デバッグの締め演出プレビュー(他章からの遷移)。読み込み後に自動再生し、
     終わったらこの章のデバッグメニューへ戻る。 */
  activate("home");
  setTimeout(()=>{ if(CASE.finaleAA)beginFinaleSequence({preview:true}); else {renderDebugMenu();activate("devmenu");} },300);
}else if(location.hash==="#thread"){
  activate("home"); /* 履歴にホームを積んでおく(戻るで板トップへ) */
  activate(CASE.pages[0].id);
}else{
  activate("home");
}

/* --- 起動ログ(額縁の外。ログが流れ終わったら本物のブラウザのホームが出る) --- */
(function(){
  const boot=document.getElementById("boot");
  const log=document.getElementById("bootLog");

  const lines=[
    "Akashiya Browser 2.4 ... <span class='ok'>OK</span>",
    "プロファイル読み込み ... <span class='ok'>OK</span>",
    "前回のセッションを復元しています..."
  ];
  lines.forEach((html,i)=>{
    const div=document.createElement("div");
    div.className="boot-log-line";div.innerHTML=html;
    log.appendChild(div);
    setTimeout(()=>div.classList.add("show"),i*250+100);
  });

  function dismissBoot(){
    boot.classList.add("fade");
    setTimeout(()=>{boot.style.display="none";},600);
  }
  setTimeout(dismissBoot,lines.length*250+500);
  log.onclick=dismissBoot; /* クリックでスキップ */
})();

/* --- 最小化 --- */
(function(){
  const browser=document.getElementById("browser");
  const taskbar=document.getElementById("taskbar");
  const taskbarBtn=document.getElementById("taskbarBtn");
  document.getElementById("btnMinimize").onclick=(e)=>{
    e.stopPropagation();
    browser.classList.add("minimized");
    taskbar.classList.add("show");
  };
  taskbarBtn.onclick=()=>{
    browser.classList.remove("minimized");
    taskbar.classList.remove("show");
  };
})();

/* --- ESC --- */
document.addEventListener("keydown",e=>{
  if(e.key!=="Escape")return;
  /* 突きつけ中は、まず突きつけ操作をキャンセルして②の選択に戻す(パネルは閉じない) */
  if(judgeState.pointing==="proof"){
    if(dragS){if(dragS.ghost)dragS.ghost.remove();dragS=null;
      document.removeEventListener("pointermove",onDragMove);
      document.removeEventListener("pointerup",onDragUp);return;}
    if(proofCand){proofCand=null;rmEl("thrustBtn");
      document.querySelectorAll(".sent.proof-cand").forEach(x=>x.classList.remove("proof-cand"));return;}
    return; /* ②の待ち受け状態: 何もしない(誤爆で認定パネルを閉じない) */
  }
  if(judgeState.pointing==="lie"){
    if(document.getElementById("thrustConfirm")){cancelLieConfirm();return;}
    return;
  }
  document.querySelectorAll(".overlay.open").forEach(o=>o.classList.remove("open"));
});
</script>
